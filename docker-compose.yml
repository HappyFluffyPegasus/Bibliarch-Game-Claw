services:
  dev:
    build: .
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - cargo_registry:/usr/local/cargo/registry
      - cargo_git:/usr/local/cargo/git
      - target:/app/src-tauri/target
    ports:
      - "1420:1420"
    working_dir: /app
    command: sleep infinity
    environment:
      - CARGO_HOME=/usr/local/cargo

volumes:
  node_modules:
  cargo_registry:
  cargo_git:
  target: